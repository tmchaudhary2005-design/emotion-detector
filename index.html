<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h1>Emotion Detection Application</h1>
        <p>Please enter the text to be analyzed:</p>
        
        <textarea id="textToAnalyze" rows="5" cols="60" placeholder="Type a sentence here..."></textarea>
        <br><br>
        
        <button onclick="RunEmotionDetection()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
            Run Emotion Detection
        </button>
        <br><br>
        
        <div id="system_response" style="margin-top: 20px; font-size: 18px;"></div>
    </div>
</body>
</html>
